<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>قسم التمن والمرق - قصر نينوى</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --main-bg: #0c0e1a;
      --card-bg: rgba(255, 255, 255, 0.04);
      --highlight: #c9a856;
      --text: #eeeeee;
      --hover-glow: rgba(201, 168, 86, 0.2);
      --blur: 16px;
      --button-bg: #c9a856;
      --button-text: #000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
      transition: 0.3s ease all;
    }

    body {
      background-color: var(--main-bg);
      color: var(--text);
      padding: 2rem;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--hover-glow), transparent);
      top: -100px;
      right: -100px;
      filter: blur(60px);
      z-index: 0;
    }

    header {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 3rem;
      color: var(--highlight);
      text-shadow: 0 0 8px rgba(201, 168, 86, 0.4);
      position: relative;
      z-index: 2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      max-width: 900px;
      margin: 0 auto 4rem auto;
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(var(--blur));
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      cursor: default;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-size: 1.4rem;
      color: var(--highlight);
      margin-bottom: 0.5rem;
    }

    .card .price {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: auto;
      color: #fff;
    }

    .back-button {
      display: block;
      margin: 0 auto;
      padding: 0.8rem 2rem;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(201, 168, 86, 0.3);
      transition: 0.3s ease-in-out;
      position: relative;
      z-index: 2;
      width: max-content;
    }

    .back-button:hover {
      background-color: #ffde7a;
      box-shadow: 0 0 20px rgba(255, 222, 122, 0.6);
    }

    @media (max-width: 600px) {
      header {
        font-size: 2rem;
      }

      .card h3 {
        font-size: 1.2rem;
      }

      .card .price {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header><i class="fas fa-bowl-rice"></i> قسم التمن والمرق</header>

  <div class="grid">
    <div class="card">
      <img src="C:\Users\user\Desktop\menu.css\صور التمن والمرق\photo_2025-06-11_06-38-55.jpg" alt="تمن ومرق" />
      <h3>تمن ومرق</h3>
      <div class="price">5,000 د.ع</div>
    </div>
    <div class="card">
      <img src="C:\Users\user\Desktop\menu.css\صور التمن والمرق\photo_2025-06-11_06-39-06.jpg" alt="تمن" />
      <h3>تمن</h3>
      <div class="price">3,000 د.ع</div>
    </div>
    <div class="card">
      <img src="C:\Users\user\Desktop\menu.css\صور التمن والمرق\photo_2025-06-11_06-39-11.jpg" alt="مرق" />
      <h3>مرق</h3>
      <div class="price">2,000 د.ع</div>
    </div>
  </div>

  <a href="menu.html" class="back-button"><i class="fas fa-arrow-right"></i> العودة إلى القائمة</a>
</body>
</html>
